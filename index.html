<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Brain</title>
<style>
:root {
  --bg: #000;
  --surface: #111;
  --surface2: #1a1a1a;
  --border: #2f3336;
  --accent: #1d9bf0;
  --text: #e7e9ea;
  --text2: #71767b;
  --green: #00ba7c;
  --red: #f4212e;
  --font: -apple-system, 'Helvetica Neue', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);}
#logo{font-size:18px;font-weight:800;}
#user-bar{display:flex;align-items:center;gap:8px;}
#user-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;display:none;}
#user-handle{font-size:12px;color:var(--text2);}
#tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:13px 4px;text-align:center;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;min-height:46px;display:flex;align-items:center;justify-content:center;user-select:none;}
.tab.active{color:var(--text);border-bottom-color:var(--accent);}
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
#main::-webkit-scrollbar{display:none;}
.panel{display:none;}
.panel.active{display:block;}
#compose-wrap{padding:12px 16px;border-bottom:1px solid var(--border);}
#compose-inner{display:flex;gap:10px;}
#compose-av{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--surface2);}
#compose-right{flex:1;}
#compose-ta{width:100%;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:17px;line-height:1.5;resize:none;min-height:50px;padding-top:6px;}
#compose-ta::placeholder{color:var(--text2);}
#compose-bot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
#cc{font-size:13px;color:var(--text2);}
#cc.warn{color:#ffd700;}#cc.over{color:var(--red);}
#post-btn{background:var(--accent);color:#fff;border:none;border-radius:20px;padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer;min-height:36px;}
#post-btn:disabled{opacity:0.4;}
#post-btn:active{opacity:0.7;}
#filter-bar{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;border-bottom:1px solid var(--border);}
#filter-bar::-webkit-scrollbar{display:none;}
.fc{font-size:13px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);color:var(--text2);cursor:pointer;white-space:nowrap;min-height:32px;display:flex;align-items:center;flex-shrink:0;transition:all 0.15s;}
.fc.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
#timeline{padding-bottom:80px;}
.ti{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);animation:fi 0.2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.ta{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--surface2);}
.tb{flex:1;min-width:0;}
.th{display:flex;align-items:baseline;gap:5px;margin-bottom:4px;flex-wrap:wrap;}
.tn{font-size:15px;font-weight:700;}
.th2{font-size:13px;color:var(--text2);}
.tt2{font-size:13px;color:var(--text2);margin-left:auto;}
.tt{font-size:15px;line-height:1.55;word-break:break-word;white-space:pre-wrap;}
.tt a{color:var(--accent);text-decoration:none;}
.tac{display:flex;gap:20px;margin-top:10px;}
.tab2{display:flex;align-items:center;gap:5px;color:var(--text2);font-size:13px;cursor:pointer;min-height:34px;background:none;border:none;padding:0;transition:color 0.15s;}
.tab2:active{color:var(--accent);}
.tab2.liked{color:var(--red);}
.tab2.rted{color:var(--green);}
#loading{text-align:center;padding:40px;color:var(--text2);font-size:14px;}
#empty{text-align:center;padding:48px 16px;color:var(--text2);}
#sp{padding:16px;}
#sb{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:10px 18px;color:var(--text);font-size:15px;outline:none;font-family:var(--font);min-height:44px;margin-bottom:16px;}
#sb::placeholder{color:var(--text2);}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:14px;font-weight:600;padding:10px 20px;border-radius:24px;z-index:1000;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}
*{scrollbar-width:none;}*::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="app">
<div id="header">
  <div id="logo">🧠 My Brain</div>
  <div id="user-bar">
    <img id="user-avatar" src="" alt="">
    <span id="user-handle">v1.1</span>
  </div>
</div>
<div id="tabs">
  <div class="tab active" data-tab="home" onclick="switchTab('home')">🏠 ホーム</div>
  <div class="tab" data-tab="search" onclick="switchTab('search')">🔍 検索</div>
</div>
<div id="main">
  <div id="panel-home" class="panel active">
    <div id="compose-wrap">
      <div id="compose-inner">
        <img id="compose-av" src="" alt="">
        <div id="compose-right">
          <textarea id="compose-ta" placeholder="いまどうしてる？" rows="2"
            oninput="onCI()" onkeydown="if(event.key==='Enter'&&event.metaKey)postTweet()"></textarea>
          <div id="compose-bot">
            <span id="cc">0/280</span>
            <button id="post-btn" onclick="postTweet()" disabled>投稿</button>
          </div>
        </div>
      </div>
    </div>
    <div id="filter-bar">
      <div class="fc active" data-f="all" onclick="setFilter('all')">すべて</div>
      <div class="fc" data-f="media" onclick="setFilter('media')">メディア</div>
    </div>
    <div id="timeline"><div id="loading">読み込み中…</div></div>
  </div>
  <div id="panel-search" class="panel">
    <div id="sp">
      <input id="sb" type="search" placeholder="キーワードで検索…" oninput="doSearch()">
      <div id="sr"></div>
    </div>
  </div>
</div>
</div>
<div id="toast"></div>
<script>
const WORKER = 'https://my-brain.tabuchi-welding.workers.dev';
const MAX = 280;
let tweets = [], filter = 'all';

async function init() {
  try {
    const r = await fetch(WORKER + '/me');
    const d = await r.json();
    if (d.data) {
      const u = d.data;
      const av = u.profile_image_url || '';
      document.getElementById('user-handle').textContent = '@' + u.username;
      if (av) {
        const img = document.getElementById('user-avatar');
        img.src = av; img.style.display = 'block';
        document.getElementById('compose-av').src = av;
      }
    }
  } catch(e) {}
  loadTimeline();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
}

async function loadTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '<div id="loading">読み込み中…</div>';
  try {
    const r = await fetch(WORKER + '/timeline');
    const d = await r.json();
    if (d.errors) { tl.innerHTML = `<div id="empty">⚠️ ${d.errors[0].message}</div>`; return; }
    tweets = d.data || [];
    const users = {};
    (d.includes?.users || []).forEach(u => users[u.id] = u);
    tweets._u = users;
    renderTL();
  } catch(e) {
    tl.innerHTML = '<div id="empty">⚠️ 読み込みに失敗しました</div>';
  }
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.fc').forEach(c => c.classList.toggle('active', c.dataset.f === f));
  renderTL();
}

function renderTL() {
  const tl = document.getElementById('timeline');
  let list = filter === 'media' ? tweets.filter(t => t.attachments) : tweets;
  if (!list.length) { tl.innerHTML = '<div id="empty">ツイートがありません</div>'; return; }
  tl.innerHTML = list.map(t => renderT(t, tweets._u || {})).join('');
}

function renderT(t, users) {
  const a = users[t.author_id] || {};
  const m = t.public_metrics || {};
  const txt = esc(t.text)
    .replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>')
    .replace(/#(\w+)/g,'<a href="https://x.com/hashtag/$1" target="_blank">#$1</a>');
  return `<div class="ti" id="tw-${t.id}">
    <img class="ta" src="${a.profile_image_url||''}" onerror="this.style.display='none'">
    <div class="tb">
      <div class="th">
        <span class="tn">${esc(a.name||'')}</span>
        <span class="th2">@${esc(a.username||'')}</span>
        <span class="tt2">${ft(t.created_at)}</span>
      </div>
      <div class="tt">${txt}</div>
      <div class="tac">
        <button class="tab2" onclick="like('${t.id}',this)">♥ ${m.like_count||0}</button>
        <button class="tab2" onclick="rt('${t.id}',this)">🔁 ${m.retweet_count||0}</button>
        <button class="tab2" onclick="reply('${esc(a.username||'')}')">💬 返信</button>
      </div>
    </div>
  </div>`;
}

function onCI() {
  const ta = document.getElementById('compose-ta');
  const l = ta.value.length;
  const cc = document.getElementById('cc');
  cc.textContent = l+'/'+MAX;
  cc.className = l>MAX?'over':l>MAX*0.8?'warn':'';
  document.getElementById('post-btn').disabled = l===0||l>MAX;
  ta.style.height='auto'; ta.style.height=Math.max(50,ta.scrollHeight)+'px';
}

async function postTweet() {
  const ta = document.getElementById('compose-ta');
  const text = ta.value.trim();
  if (!text||text.length>MAX) return;
  const btn = document.getElementById('post-btn');
  btn.disabled=true; btn.textContent='投稿中…';
  try {
    const r = await fetch(WORKER+'/tweet',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    const d = await r.json();
    if (d.data) { ta.value=''; ta.style.height='auto'; document.getElementById('cc').textContent='0/'+MAX; showToast('✓ 投稿しました'); setTimeout(loadTimeline,1500); }
    else showToast('⚠️ 投稿失敗');
  } catch(e){showToast('⚠️ エラー');}
  btn.textContent='投稿'; btn.disabled=false;
}

async function like(id,btn) {
  btn.classList.toggle('liked');
  try { await fetch(WORKER+'/like',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tweetId:id})}); showToast('♥ いいね'); } catch(e){}
}

async function rt(id,btn) {
  btn.classList.toggle('rted');
  try { await fetch(WORKER+'/retweet',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tweetId:id})}); showToast('🔁 RT'); } catch(e){}
}

function reply(handle) {
  const ta = document.getElementById('compose-ta');
  ta.value='@'+handle+' '; ta.focus();
  switchTab('home');
  document.getElementById('main').scrollTo(0,0);
  onCI();
}

async function doSearch() {
  const q = document.getElementById('sb').value.trim();
  const sr = document.getElementById('sr');
  if (!q) { sr.innerHTML=''; return; }
  sr.innerHTML='<div style="color:var(--text2);padding:16px 0;">検索中…</div>';
  try {
    const r = await fetch(WORKER+'/search?q='+encodeURIComponent(q));
    const d = await r.json();
    const list = d.data||[];
    const users={};
    (d.includes?.users||[]).forEach(u=>users[u.id]=u);
    sr.innerHTML = list.length ? list.map(t=>renderT(t,users)).join('') : '<div style="color:var(--text2);padding:16px 0;">見つかりません</div>';
  } catch(e){sr.innerHTML='<div style="color:var(--text2);">エラー</div>';}
}

function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ft(iso){if(!iso)return'';const d=new Date(iso),now=new Date(),df=(now-d)/1000;if(df<60)return'今';if(df<3600)return Math.floor(df/60)+'分前';if(df<86400)return Math.floor(df/3600)+'時間前';return(d.getMonth()+1)+'/'+(d.getDate());}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

init();
</script>
</body>
</html>
